<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruwana - Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Roboto',sans-serif; margin:0; padding:0; background:#FAF6F0; color:#4A5A43; }
    header { text-align:center; padding:60px 20px; background:#D8EAD3; }
    header h1 a { text-decoration:none; color:#4A5A43; }
    .product-grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding:20px; }
    .product-card { width:220px; padding:15px; border-radius:12px; background:#EFF5EC; text-align:center; }
    .product-card img { width:200px; border-radius:12px; }
    footer { text-align:center; padding:40px 20px; background:#D8EAD3; color:#4A5A43; margin-top:50px; }

    /* Side Navigation */
    .side-nav {
      width: 200px; position: fixed; top:0; left:0; height:100%; background:#D8EAD3; padding-top:60px;
    }
    .side-nav ul { list-style:none; padding:0; margin:0; }
    .side-nav li { position:relative; }
    .side-nav a { display:block; color:#4A5A43; padding:12px 20px; text-decoration:none; font-weight:bold; }
    .side-nav a:hover { background:#A6CFA8; color:#fff; }
    .side-nav .dropdown { display:none; list-style:none; padding-left:0; }
    .side-nav li:hover .dropdown { display:block; }
    .side-nav .dropdown li a { padding-left:40px; background:#EFF5EC; }

    .main-content { margin-left:220px; padding:20px; }
  </style>
</head>
<body>

  <!-- Side Navigation -->
  <nav class="side-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li>
        <a href="#">About &#9662;</a>
        <ul class="dropdown">
          <li><a href="about.html">About Ruwana</a></li>
        </ul>
      </li>
      <li>
        <a href="#">Products &#9662;</a>
        <ul class="dropdown">
          <li><a href="products.html">View Products</a></li>
          <li><a href="custom.html">Custom Order</a></li>
        </ul>
      </li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <header>
      <h1><a href="index.html">Ruwana</a></h1>
    </header>

    <section>
      <h2>Our Products</h2>
      <div class="product-grid">
        <div class="product-card">
          <img src="images/cardigan.jpg" alt="Cardigan">
          <p>Cardigan</p>
        </div>
        <div class="product-card">
          <img src="images/pullover.jpg" alt="Pullover">
          <p>Pullover</p>
        </div>
        <div class="product-card">
          <img src="images/top.jpg" alt="Top">
          <p>Top</p>
        </div>
        <div class="product-card">
          <img src="images/bag.jpg" alt="Bag">
          <p>Bag</p>
        </div>
      </div>
    </section>

    <footer>
      &copy; 2026 Ruwana. Handmade with ❤️ in Arequipa, Peru.
    </footer>
  </div>

</body>
</html>
