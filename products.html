<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruwana - Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Roboto',sans-serif; margin:0; padding:0; background:#FAF6F0; color:#4A5A43; }
    header { background:#D8EAD3; text-align:center; padding:60px 20px; }
    header h1 { font-size:2.8rem; margin-bottom:10px; color:#4A5A43; }
    nav { text-align:center; margin:20px 0; }
    nav a { margin:0 15px; color:#4A5A43; font-weight:bold; }
    .section { padding:40px 20px; max-width:1200px; margin:0 auto; }
    .product-grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
    .product-card { background:#EFF5EC; width:220px; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; align-items:center; padding:15px; box-shadow:0 3px 10px rgba(0,0,0,0.08); transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-5px); }
    .product-card img { width:100%; border-radius:8px; margin-bottom:10px; }
    .product-card h3 { margin:5px 0; font-size:1.1rem; color:#4A5A43; text-align:center; }
    .product-card p { margin:5px 0 10px; font-size:1rem; color:#BDAF9E; }
    .buy-btn { background:#A6CFA8; color:#fff; padding:8px 15px; border-radius:6px; font-weight:bold; text-align:center; width:100%; text-decoration:none; margin-top:auto; }
    .buy-btn:hover { background:#8FB48E; }
    footer { text-align:center; padding:40px 20px; background:#D8EAD3; color:#4A5A43; margin-top:50px; }
    @media(max-width:600px) { .product-grid{ flex-direction:column; align-items:center; } .product-card{ width:90%; } }
  </style>
</head>
<body>

  <header>
    <h1>Our Products</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="products.html">Products</a>
    <a href="custom.html">Custom Order</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="section">
    <div class="product-grid">
      <div class="product-card">
        <img src="images/cardigan.jpg" alt="Cardigan">
        <h3>Knitted Cardigan</h3>
        <p>$40</p>
        <a href="custom.html" class="buy-btn">Customize</a>
      </div>
      <div class="product-card">
        <img src="images/pullover.jpg" alt="Pullover">
        <h3>Crochet Pullover</h3>
        <p>$35</p>
        <a href="custom.html" class="buy-btn">Customize</a>
      </div>
      <div class="product-card">
        <img src="images/beanie.jpg" alt="Beanie">
        <h3>Cozy Beanie</h3>
        <p>$15</p>
        <a href="custom.html" class="buy-btn">Customize</a>
      </div>
      <div class="product-card">
        <img src="images/bag.jpg" alt="Bag">
        <h3>Handmade Bag</h3>
        <p>$25</p>
        <a href="custom.html" class="buy-btn">Customize</a>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 Ruwana. Handmade with ❤️ in Arequipa, Peru.
  </footer>

</body>
</html>
