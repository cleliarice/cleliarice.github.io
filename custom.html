<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruwana - Custom Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Roboto',sans-serif; margin:0; padding:0; background:#FAF6F0; color:#4A5A43; }
    header { text-align:center; padding:60px 20px; background:#D8EAD3; }
    header h1 a { text-decoration:none; color:#4A5A43; }

    section { padding:40px 20px; max-width:600px; margin:auto; background:#EFF5EC; border-radius:12px; }
    label { display:block; margin:12px 0 4px; font-weight:bold; }
    input, select, textarea { width:100%; padding:8px; margin-bottom:12px; border-radius:6px; border:1px solid #ccc; }
    button { background:#A6CFA8; color:#fff; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
    button:hover { background:#8FB48E; }
    .confirmation { margin-top:15px; color:#4A5A43; font-weight:bold; }

    /* Side Navigation */
    .side-nav {
      width: 200px; position: fixed; top:0; left:0; height:100%; background:#D8EAD3; padding-top:60px;
    }
    .side-nav ul { list-style:none; padding:0; margin:0; }
    .side-nav li { position:relative; }
    .side-nav a { display:block; color:#4A5A43; padding:12px 20px; text-decoration:none; font-weight:bold; }
    .side-nav a:hover { background:#A6CFA8; color:#fff; }
    .side-nav .dropdown { display:none; list-style:none; padding-left:0; }
    .side-nav li:hover .dropdown { display:block; }
    .side-nav .dropdown li a { padding-left:40px; background:#EFF5EC; }

    .main-content { margin-left:220px; padding:20px; }
  </style>
</head>
<body>

  <!-- Side Navigation -->
  <nav class="side-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li>
        <a href="#">About &#9662;</a>
        <ul class="dropdown">
          <li><a href="about.html">About Ruwana</a></li>
        </ul>
      </li>
      <li>
        <a href="#">Products &#9662;</a>
        <ul class="dropdown">
          <li><a href="products.html">View Products</a></li>
          <li><a href="custom.html">Custom Order</a></li>
        </ul>
      </li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <header>
      <h1><a href="index.html">Ruwana</a></h1>
    </header>

    <section>
      <h2>Create Your Custom Item</h2>
      <form id="customForm">
        <label for="productType">Product Type:</label>
        <select id="productType" required>
          <option value="">Select a product</option>
          <option>Cardigan</option>
          <option>Pullover</option>
          <option>Top</option>
          <option>Bag</option>
          <option>Beanie</option>
          <option>Hat</option>
          <option>Bikini</option>
        </select>

        <label for="yarnColor">Yarn Color:</label>
        <input type="text" id="yarnColor" placeholder="Enter your preferred color" required>

        <label for="yarnPattern">Yarn Pattern:</label>
        <input type="text" id="yarnPattern" placeholder="Enter desired pattern" required>

        <label for="measurements">Measurements:</label>
        <textarea id="measurements" rows="4" placeholder="Enter your measurements" required></textarea>

        <button type="submit">Submit Custom Order</button>
        <div class="confirmation" id="confirmationMsg"></div>
      </form>
    </section>

    <footer>
      &copy; 2026 Ruwana. Handmade with ❤️ in Arequipa, Peru.
    </footer>
  </div>

  <script>
    const form = document.getElementById('customForm');
    const confirmation = document.getElementById('confirmationMsg');

    form.addEventListener('submit', function(e){
      e.preventDefault();
      confirmation.textContent = "Thank you! Your custom order has been received. We'll contact you soon.";
      form.reset();
    });
  </script>

</body>
</html>
