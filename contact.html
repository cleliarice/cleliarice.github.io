<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruwana - Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Roboto',sans-serif; margin:0; padding:0; background:#FAF6F0; color:#4A5A43; }
    header { display:flex; align-items:center; padding:20px; background:#D8EAD3; }
    header h1 { flex:1; margin:0; font-size:24px; }
    header h1 a { text-decoration:none; color:#4A5A43; }
    .hamburger { font-size:30px; cursor:pointer; user-select:none; }
    .menu { display:none; position:absolute; top:60px; left:0; width:200px; background:#D8EAD3; list-style:none; padding:0; margin:0; border-radius:0 0 8px 0; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); z-index:1000; }
    .menu li { border-bottom:1px solid #A6CFA8; }
    .menu li:last-child { border-bottom:none; }
    .menu li a { display:block; padding:12px 20px; color:#4A5A43; text-decoration:none; font-weight:bold; }
    .menu li a:hover { background:#A6CFA8; color:#fff; }
    .main-content { padding:20px; margin-top:20px; }
    input, textarea { width:100%; padding:8px; margin-bottom:12px; border-radius:6px; border:1px solid #ccc; }
    button { background:#A6CFA8; color:#fff; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
    button:hover { background:#8FB48E; }
  </style>
</head>
<body>

  <header>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <h1><a href="index.html">Ruwana</a></h1>
  </header>

  <ul class="menu" id="menu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Ruwana</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="custom.html">Custom Order</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

  <div class="main-content">
    <h2>Contact Us</h2>
    <p>If you have any questions or want to collaborate, feel free to send us a message:</p>
    <form id="contactForm">
      <label for="name">Name:</label>
      <input type="text" id="name" required>
      <label for="email">Email:</label>
      <input type="email" id="email" required>
      <label for="message">Message:</label>
      <textarea id="message" rows="4" required></textarea>
      <button type="submit">Send Message</button>
      <div class="confirmation" id="confirmationMsg"></div>
    </form>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }

    const form = document.getElementById('contactForm');
    const confirmation = document.getElementById('confirmationMsg');
    form.addEventListener('submit', function(e){
      e.preventDefault();
      confirmation.textContent = "Thank you! Your message has been sent. We'll get back to you soon.";
      form.reset();
    });
  </script>

</body>
</html>
